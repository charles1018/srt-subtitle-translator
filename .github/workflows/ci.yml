name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 讓後推的 commit 取消仍在跑的同分支流程，節省 runner 時間
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint / Types / Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev --python ${{ matrix.python-version }}

      - name: Ruff lint
        run: uv run ruff check

      - name: Mypy type check
        run: uv run mypy src/srt_translator

      # tkinter/顯示器在裸 runner 上不保證存在，排除 gui marker 保持 headless 安全
      - name: Pytest (non-GUI)
        run: uv run pytest -q -m "not gui"
